<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/indexStyle.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
</head>
<body>
<div id="game-controls">
    <label for="cardCountSlider">Aantal kaarten:</label>
    <input type="range" id="cardCountSlider" min="3" max="19" value="6" step="1">
    <span id="cardCountDisplay">6</span>

    <label for="matchCountSlider">Aantal matching kaarten:</label>
    <input type="range" id="matchCountSlider" min="2" max="5" value="2" step="1">
    <span id="matchCountDisplay">2</span>
</div>
<div id="game-board"></div>
<script type="text/javascript" charset="utf-8" src="scripts/indexScript.js"></script>
</body>
</html>
